<!DOCTYPE html>
<html>
<head>
  <title>Vega-Lite Bar Chart</title>
  <meta charset="utf-8">

  <script src="https://cdn.jsdelivr.net/npm/vega@5.20.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.1.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.18.2"></script>

  <style media="screen">
    /* Add space between Vega-Embed links  */
    .vega-actions a {
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <h1>Assignment #3 - IS445</h1>
<h2>Vega-Lite Visualization for Illinois Building Inventory Data</h2>
  <!-- Container for the visualization -->
  <div id="vis"></div>

  <script>
  // Assign the specification to a local variable vlSpec.
  var vlSpec = {
  "$schema": "https://vega.github.io/schema/vega-lite/v4.json",
  "data": {
    "url": "https://raw.githubusercontent.com/npanczyk/npanczyk.github.io/main/building_inventory.csv"
  },
  "mark": "point",
  "encoding": {
    "x": {"field": "Year Constructed", "type": "temporal"},
    "y": {"field": "Total Floors", "type": "quantitative"},
    "color": {"field": "Usage Description", "type": "nominal"},
    "size": {
      "field": "Square Footage",
      "type": "quantitative",
      "scale": "range[10,10000]",
      "legend": "tickCount:5"
    },
    "tooltip": {"field": "County", "type": "nominal"}
  }
};

  // optional argument passed to Vega-Embed to specify Vega-Lite spec. More info at https://github.com/vega/vega-embed
  var opt = {
    "mode": "vega-lite"
  };

  // Embed the visualization in the container with id `vis`
  vegaEmbed("#vis", vlSpec, opt).then(function(result) {
    // Callback receiving the View instance and parsed Vega spec
    // result.view is the View, which resides under the '#vis' element
  }).catch(console.warn);
  </script>
</body>
</html>
